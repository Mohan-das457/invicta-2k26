[build]
  # Run a production build then a static export so Netlify can publish `out/`.
  # If you prefer serverless Next builds, we can remove the export and use Netlify's
  # Next plugin instead — tell me and I'll switch it.
  command = "npm install && npm run build"
  publish = "out"

[build.environment]
  # Next.js 16 requires Node >= 20.9.0 — use a 20.x runtime on Netlify
  NODE_VERSION = "20.9.0"

